services:

  # ── MySQL ────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: sogda_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sogda_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Laravel (PHP-FPM) ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: sogda_app
    restart: unless-stopped
    environment:
      APP_NAME: "Sogda Tour CRM"
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: https://my.sogdatour.uz
      APP_LOCALE: ru

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: local

      SANCTUM_STATEFUL_DOMAINS: my.sogdatour.uz
      FRONTEND_URL: https://my.sogdatour.uz

      LOG_CHANNEL: stderr
      LOG_LEVEL: error
    volumes:
      - backend_storage:/var/www/backend/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sogda_net

  # ── Nginx + Vue frontend ─────────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: sogda_nginx
    restart: unless-stopped
    ports:
      - "8093:80"
    depends_on:
      - app
    networks:
      - sogda_net
    volumes:
      - backend_storage:/var/www/backend/storage:ro

volumes:
  mysql_data:
  backend_storage:

networks:
  sogda_net:
    driver: bridge
